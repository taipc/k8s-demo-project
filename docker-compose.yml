version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672" # Dashboard quản lý

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  api:
    build: ./api
    ports:
      - "5001:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  worker:
    build: ./worker
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - rabbitmq
      - mongodb