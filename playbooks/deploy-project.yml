---
- name: Quản lý Full Flow Project
  hosts: local
  connection: local
  vars:
    app_version: "v7"
    namespace: "default"

  tasks:
    # --- PHẦN KIỂM TRA HẠ TẦNG ---
    - name: Kiểm tra trạng thái Minikube
      command: minikube status
      register: minikube_check
      ignore_errors: yes

    - name: Dừng lại nếu Minikube chưa chạy
      fail:
        msg: "Sếp ơi, Minikube chưa bật! Hãy chạy 'minikube start' trước nhé."
      when: "'Stopped' in minikube_check.stdout"

    - name: 1. Kiểm tra kết nối tới Cluster
      kubernetes.core.k8s_info:
        kind: Node
      register: node_info

    # --- PHẦN TRIỂN KHAI ỨNG DỤNG ---
    - name: 2. Deploy MongoDB & RabbitMQ
      kubernetes.core.k8s:
        state: present
        namespace: "{{ namespace }}"
        src: "../k8s/{{ item }}.yaml"
      loop:
        - mongodb
        - rabbitmq

    - name: 3. Deploy API & Worker
      kubernetes.core.k8s:
        state: present
        namespace: "{{ namespace }}"
        src: "../k8s/{{ item }}.yaml"
      loop:
        - api
        - worker
    - name: 4. Đợi cho các Pod sẵn sàng (Health Check)
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - "app={{ 
           }}"
      register: pod_status
      until: 
        - pod_status.resources | length > 0
        - pod_status.resources[0].status.phase == "Running"
      retries: 10
      delay: 5
      loop:
        - mongodb
        - rabbitmq
        - api-app
        - worker-app
    - name: 5. Lấy NodePort của API
      shell: "kubectl get svc api-service -o jsonpath='{.spec.ports[0].nodePort}'"
      register: api_nodeport

    - name: 6. Lấy IP của Minikube
      shell: "minikube ip"
      register: minikube_ip
    - name: 7. Tự động mở cổng kết nối (Port-forward)
      shell: "nohup kubectl port-forward svc/api-service 8080:90 > /dev/null 2>&1 &"
      async: 10
      poll: 0
    - name: Hiển thị địa chỉ truy cập
      debug:
        msg: "Sếp ơi, truy cập API tại đây: http://{{ minikube_ip.stdout }}:{{ api_nodeport.stdout }}"
    
